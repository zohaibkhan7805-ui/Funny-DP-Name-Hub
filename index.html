<!DOCTYPE html>
<html>
<head>
  <title>Funny DP & Name Hub</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }
    .card {
      background: white;
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>🔥 Firebase DP Test</h2>

  <div class="card">
    <h3 id="name">Loading...</h3>
    <img id="image" />
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔴 IMPORTANT: yahan apna Firebase config paste karna hoga
const firebaseConfig = {
  apiKey: "AIzaSyCzdxRXm0UuoOZvhsr3K-f6zh7FWdMZDiw",
  authDomain: "funny-dp-test.firebaseapp.com",
  projectId: "funny-dp-test",
  storageBucket: "funny-dp-test.firebasestorage.app",
  messagingSenderId: "929166361346",
  appId: "1:929166361346:web:d6693d9719c659d45a781b",
  measurementId: "G-SGGPRBV9DX"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadData() {
    const docRef = doc(db, "test", "3tJRY2Llv2b8H7rIIZEu");
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      document.getElementById("name").innerText = docSnap.data().name;
      document.getElementById("image").src = docSnap.data().image;
    }
  }

  loadData();
</script>

</body>
</html>
